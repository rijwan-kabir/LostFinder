<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - DIU LostFinder</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <link rel="stylesheet" th:href="@{/css/responsive.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a href="/" class="logo">
            DIU <span>LostFinder</span>
        </a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/register">Register</a>
            <a href="/login">Login</a>
        </div>
    </div>
</nav>

<div class="auth-container">
    <h2><i class="fas fa-lock"></i> Reset Password</h2>

    <div th:if="${error}" class="alert alert-error">
        <i class="fas fa-exclamation-circle"></i>
        <span th:text="${error}">Error message</span>
    </div>

    <form th:action="@{/reset-password}" method="post">
        <input type="hidden" name="token" th:value="${token}">

        <div class="form-group">
            <label><i class="fas fa-lock"></i> New Password:</label>
            <input type="password" name="password" placeholder="Enter new password" required minlength="6">
            <small><i class="fas fa-info-circle"></i> Minimum 6 characters</small>
        </div>

        <div class="form-group">
            <label><i class="fas fa-lock"></i> Confirm Password:</label>
            <input type="password" name="confirmPassword" placeholder="Confirm new password" required minlength="6">
        </div>

        <button type="submit" class="btn btn-primary btn-block">
            <i class="fas fa-save"></i> Reset Password
        </button>

        <div class="auth-link">
            <a href="/login"><i class="fas fa-sign-in-alt"></i> Back to Login</a>
        </div>
    </form>
</div>

<footer class="footer">
    <div class="container">
        <p>&copy; 2026 DIU LostFinder. All rights reserved.</p>
        <p>Daffodil International University</p>
    </div>
</footer>
</body>
</html>
