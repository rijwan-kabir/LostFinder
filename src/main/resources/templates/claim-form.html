<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claim Item - DIU LostFinder</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<nav class="navbar">
    <div class="container">
        <a href="/" class="logo">DIU <span>LostFinder</span></a>
        <div class="nav-links">
            <a href="/" class="nav-link">Home</a>
            <a href="/dashboard" class="nav-link">Dashboard</a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="nav-link">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="auth-container">
    <h2><i class="fas fa-hand-holding-heart"></i> Claim Item</h2>

    <div class="item-info-box">
        <h3 th:text="${item.title}">Item Title</h3>
        <p><i class="fas fa-map-marker-alt"></i> <span th:text="${item.location}">Location</span></p>
        <p><i class="fas fa-calendar"></i> <span th:text="${#temporals.format(item.date, 'dd MMM yyyy')}">Date</span></p>
        <p th:text="${item.description}">Description</p>
    </div>

    <form th:action="@{/claim/submit}" method="post">
        <input type="hidden" name="itemId" th:value="${item.id}">

        <div class="form-group">
            <label><i class="fas fa-align-left"></i> Why do you think this is your item?</label>
            <textarea name="description" rows="4" placeholder="Describe why this item belongs to you..." required></textarea>
        </div>

        <div class="form-group">
            <label><i class="fas fa-paperclip"></i> Proof (Optional)</label>
            <textarea name="proof" rows="3" placeholder="Any additional proof or details..."></textarea>
            <small>e.g., serial number, unique marks, purchase receipt</small>
        </div>

        <button type="submit" class="btn btn-primary btn-block">
            <i class="fas fa-paper-plane"></i> Submit Claim
        </button>

        <div class="auth-link">
            <a href="/items">Back to Items</a>
        </div>
    </form>
</div>

<style>
    .item-info-box {
        background: var(--bg-light);
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 20px;
    }
    .item-info-box h3 {
        margin-bottom: 10px;
        color: var(--diu-green);
    }
    textarea {
        width: 100%;
        padding: 12px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-family: inherit;
    }
</style>

<footer class="footer">
    <div class="container">
        <p>&copy; 2026 DIU LostFinder. All rights reserved.</p>
    </div>
</footer>
</body>
</html>
