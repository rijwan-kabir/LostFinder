<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - DIU LostFinder</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <link rel="stylesheet" th:href="@{/css/responsive.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a href="/" class="logo">
            DIU <span>LostFinder</span>
        </a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/register">Register</a>
            <a href="/login">Login</a>
        </div>
    </div>
</nav>

<div class="auth-container">
    <h2><i class="fas fa-key"></i> Forgot Password</h2>

    <div th:if="${success}" class="alert alert-success">
        <i class="fas fa-check-circle"></i>
        <span th:text="${success}"></span>
    </div>

    <div th:if="${error}" class="alert alert-error">
        <i class="fas fa-exclamation-circle"></i>
        <span th:text="${error}"></span>
    </div>

    <form th:action="@{/forgot-password}" method="post">
        <div class="form-group">
            <label><i class="fas fa-envelope"></i> DIU Email:</label>
            <input type="email" name="email" placeholder="example@diu.edu.bd" required autofocus>
            <small><i class="fas fa-info-circle"></i> Enter your registered DIU email address</small>
        </div>

        <button type="submit" class="btn btn-primary btn-block">
            <i class="fas fa-paper-plane"></i> Send Reset Link
        </button>

        <div class="auth-link">
            <p>Remember your password?</p>
            <a href="/login"><i class="fas fa-sign-in-alt"></i> Back to Login</a>
        </div>
    </form>
</div>

<footer class="footer">
    <div class="container">
        <p>&copy; 2026 DIU LostFinder. All rights reserved.</p>
        <p>Daffodil International University</p>
    </div>
</footer>
</body>
</html>
