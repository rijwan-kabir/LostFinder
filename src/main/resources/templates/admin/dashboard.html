<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - DIU LostFinder</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<!-- Navigation section -->
<nav class="navbar">
    <div class="container">
        <a href="/" class="logo">
            DIU <span>LostFinder</span>
        </a>
        <div class="nav-links">
            <a href="/" class="nav-link">Home</a>
            <!-- This should go to admin dashboard, not user dashboard -->
            <a href="/admin/dashboard" class="nav-link">Dashboard</a>
            <a href="/admin/items" class="nav-link">Items</a>
            <a href="/admin/users" class="nav-link">Users</a>
            <form th:action="@{/logout}" method="post" class="nav-form">
                <button type="submit" class="nav-link">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="admin-container">
    <h1><i class="fas fa-shield-alt"></i> Admin Dashboard</h1>

    <div class="stats-grid">
        <div class="stat-card">
            <i class="fas fa-users"></i>
            <div>
                <h3 th:text="${userCount}">0</h3>
                <p>Total Users</p>
            </div>
        </div>
        <div class="stat-card">
            <i class="fas fa-user-shield"></i>
            <div>
                <h3 th:text="${adminCount}">0</h3>
                <p>Admins</p>
            </div>
        </div>
        <div class="stat-card">
            <i class="fas fa-boxes"></i>
            <div>
                <h3 th:text="${totalItems}">0</h3>  <!-- Changed: dynamic -->
                <p>Total Items</p>
                <small th:text="${pendingItemsCount} + ' pending approval'"></small>  <!-- Added: pending count -->
            </div>
        </div>
        <div class="stat-card">
            <i class="fas fa-clipboard-list"></i>
            <div>
                <h3>0</h3>
                <p>Pending Claims</p>
            </div>
        </div>
    </div>

    <div class="admin-actions">
        <a href="/admin/users" class="action-btn">
            <i class="fas fa-users"></i> Manage Users
        </a>
        <a href="/admin/items" class="action-btn">
            <i class="fas fa-boxes"></i> Manage Items
        </a>
        <a href="/admin/claims" class="action-btn">
            <i class="fas fa-clipboard-list"></i> Manage Claims
        </a>
        <a href="/admin/reports" class="action-btn">
            <i class="fas fa-chart-line"></i> View Reports
        </a>
    </div>
</div>

<footer class="footer">
    <div class="container">
        <p>&copy; 2026 DIU LostFinder. All rights reserved.</p>
    </div>
</footer>
</body>
</html>
