<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View User - Admin</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="/" class="logo">DIU <span>LostFinder</span></a>
    <div class="nav-links">
      <a href="/" class="nav-link">Home</a>
      <a href="/admin/dashboard" class="nav-link">Dashboard</a>
      <a href="/admin/items" class="nav-link">Items</a>
      <a href="/admin/users" class="nav-link">Users</a>
      <form th:action="@{/logout}" method="post">
        <button type="submit" class="nav-link">Logout</button>
      </form>
    </div>
  </div>
</nav>

<div class="admin-container">
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

  <h1><i class="fas fa-user-circle"></i> User Details</h1>

  <div class="user-detail-card" th:if="${user != null}">
    <div class="user-header">
      <div class="user-avatar" th:text="${user.fullName.substring(0,1)}">R</div>
      <div class="user-info">
        <h2 th:text="${user.fullName}">User Name</h2>
        <p><i class="fas fa-envelope"></i> <span th:text="${user.email}">email@diu.edu.bd</span></p>
      </div>
      <span th:class="${user.role == 'ADMIN'} ? 'badge-admin' : 'badge-user'"
            th:text="${user.role}">USER</span>
    </div>

    <div class="user-details">
      <div class="detail-row">
        <i class="fas fa-id-card"></i>
        <strong>Student ID:</strong>
        <span th:text="${user.studentId}">-</span>
      </div>
      <div class="detail-row">
        <i class="fas fa-building"></i>
        <strong>Department:</strong>
        <span th:text="${user.department}">-</span>
      </div>
      <div class="detail-row">
        <i class="fas fa-phone"></i>
        <strong>Phone:</strong>
        <span th:text="${user.phone}">-</span>
      </div>
      <div class="detail-row">
        <i class="fas fa-calendar-alt"></i>
        <strong>Joined:</strong>
        <span th:text="${#temporals.format(user.createdAt, 'dd MMM yyyy HH:mm')}">Date</span>
      </div>
    </div>

    <div class="action-buttons">
      <a th:href="@{/admin/users/edit/{id}(id=${user.id})}" class="btn-edit">
        <i class="fas fa-edit"></i> Edit User
      </a>
      <a href="/admin/users" class="btn-secondary">
        <i class="fas fa-arrow-left"></i> Back to Users
      </a>
    </div>
  </div>
</div>

<style>
  .user-detail-card {
    background: white;
    border-radius: 20px;
    padding: 30px;
    box-shadow: var(--shadow);
    max-width: 700px;
    margin: 0 auto;
  }

  .user-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 30px;
    padding-bottom: 20px;
    border-bottom: 2px solid var(--bg-light);
  }

  .user-avatar {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, var(--diu-green), var(--diu-blue));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    font-weight: 700;
    color: white;
  }

  .user-info h2 {
    font-size: 1.5rem;
    margin-bottom: 5px;
  }

  .user-info p {
    color: var(--text-light);
  }

  .user-details {
    margin-bottom: 30px;
  }

  .detail-row {
    padding: 12px 0;
    border-bottom: 1px solid #e0e0e0;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .detail-row i {
    width: 25px;
    color: var(--diu-green);
  }

  .detail-row strong {
    width: 110px;
    color: var(--text-dark);
  }

  .action-buttons {
    display: flex;
    gap: 15px;
    padding-top: 20px;
  }

  .btn-edit {
    background: #ff9800;
    color: white;
    text-decoration: none;
    padding: 10px 20px;
    border-radius: 8px;
    display: inline-block;
  }

  .btn-secondary {
    background: #666;
    color: white;
    text-decoration: none;
    padding: 10px 20px;
    border-radius: 8px;
  }

  .alert {
    padding: 12px 20px;
    margin-bottom: 20px;
    border-radius: 8px;
  }

  .alert-success {
    background: #d4edda;
    color: #155724;
    border-left: 4px solid #28a745;
  }

  .alert-error {
    background: #f8d7da;
    color: #721c24;
    border-left: 4px solid #f44336;
  }
</style>

<footer class="footer">
  <div class="container">
    <p>&copy; 2026 DIU LostFinder. All rights reserved.</p>
  </div>
</footer>
</body>
</html>
