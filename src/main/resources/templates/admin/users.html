<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Users - Admin</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<nav class="navbar">
    <div class="container">
        <a href="/" class="logo">DIU <span>LostFinder</span></a>
        <div class="nav-links">
            <a href="/" class="nav-link">Home</a>
            <a href="/admin/dashboard" class="nav-link">Dashboard</a>
            <a href="/admin/items" class="nav-link">Items</a>
            <a href="/admin/claims" class="nav-link">Claims</a>
            <a href="/admin/reports" class="nav-link">Reports</a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="nav-link">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="admin-container">
    <div class="admin-header">
        <h1><i class="fas fa-users"></i> Manage Users</h1>
        <div class="search-box">
            <form method="get" action="/admin/users">
                <input type="text" name="search" placeholder="Search by name or email..." th:value="${searchKeyword}">
                <button type="submit"><i class="fas fa-search"></i></button>
            </form>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="users-table">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Student ID</th>
                <th>Department</th>
                <th>Role</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}">1</td>
                <td th:text="${user.fullName}">Name</td>
                <td th:text="${user.email}">email@diu.edu.bd</td>
                <td th:text="${user.studentId}">ID</td>
                <td th:text="${user.department}">CSE</td>
                <td><span th:class="${user.role == 'ADMIN'} ? 'badge-admin' : 'badge-user'"
                          th:text="${user.role}">USER</span></td>
                <td class="actions">
                    <a th:href="@{/admin/users/edit/{id}(id=${user.id})}" class="btn-edit"><i
                            class="fas fa-edit"></i></a>
                    <form th:action="@{/admin/users/delete/{id}(id=${user.id})}" method="post" style="display:inline;">
                        <button type="submit" class="btn-delete" onclick="return confirm('Delete this user?')"><i
                                class="fas fa-trash"></i></button>
                    </form>
                    <form th:if="${user.role == 'USER'}" th:action="@{/admin/users/make-admin/{id}(id=${user.id})}"
                          method="post" style="display:inline;">
                        <button type="submit" class="btn-make-admin" onclick="return confirm('Make this user admin?')">
                            <i class="fas fa-user-shield"></i></button>
                    </form>
                    <form th:if="${user.role == 'ADMIN'}" th:action="@{/admin/users/remove-admin/{id}(id=${user.id})}"
                          method="post" style="display:inline;">
                        <button type="submit" class="btn-remove-admin" onclick="return confirm('Remove admin role?')"><i
                                class="fas fa-user-minus"></i></button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<style>

    /* Navbar fix */
    .navbar .container {
        flex-wrap: wrap;
        gap: 10px;
    }

    .nav-links {
        flex-wrap: wrap;
        gap: 5px !important;
    }

    .nav-link {
        padding: 6px 10px !important;
        font-size: 0.9rem !important;
    }

    /* Table responsive fix */
    .users-table {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }

    table {
        min-width: 650px; /* table ছোট না হয়ে scroll করবে */
    }

    /* Actions column fixed width */
    td.actions {
        white-space: nowrap;
        min-width: 120px;
    }

    .admin-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        flex-wrap: wrap;
        gap: 20px;
    }

    .search-box input {
        padding: 10px;
        border: 2px solid #e0e0e0;
        border-radius: 25px;
        width: 250px;
    }

    .search-box button {
        background: #4caf50;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 25px;
        cursor: pointer;
    }

    .users-table {
        background: white;
        border-radius: 15px;
        overflow-x: auto;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    th, td {
        padding: 12px 15px;
        text-align: left;
        border-bottom: 1px solid #e0e0e0;
    }

    th {
        background: #f5f5f5;
    }

    .badge-admin {
        background: #4caf50;
        color: white;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 12px;
    }

    .badge-user {
        background: #e0e0e0;
        color: #666;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 12px;
    }

    .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
    }

    .btn-edit {
        background: #ff9800;
        color: white;
        padding: 5px 10px;
        border-radius: 5px;
        text-decoration: none;
    }

    .btn-delete {
        background: #f44336;
        color: white;
        border: none;
        padding: 5px 10px;
        border-radius: 5px;
        cursor: pointer;
    }

    .btn-make-admin {
        background: #4caf50;
        color: white;
        border: none;
        padding: 5px 10px;
        border-radius: 5px;
        cursor: pointer;
    }

    .btn-remove-admin {
        background: #ff9800;
        color: white;
        border: none;
        padding: 5px 10px;
        border-radius: 5px;
        cursor: pointer;
    }

    .alert {
        padding: 12px 20px;
        margin-bottom: 20px;
        border-radius: 8px;
    }

    .alert-success {
        background: #d4edda;
        color: #155724;
        border-left: 4px solid #28a745;
    }

    .alert-error {
        background: #f8d7da;
        color: #721c24;
        border-left: 4px solid #f44336;
    }


    .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
    }

    .actions a,
    .actions button {
        background: #4caf50 !important;  /* সবুজ background */
        color: white !important;
        border: none;
        padding: 6px 12px;
        border-radius: 5px;
        cursor: pointer;
        text-decoration: none;
        font-size: 0.8rem;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        transition: all 0.3s ease;
    }

    .actions a:hover,
    .actions button:hover {
        transform: translateY(-2px);
        filter: brightness(1.1);
    }

    /* Different colors for different buttons */
    .actions .btn-view,
    .actions a[href*="view"] {
        background: #2196f3 !important;
    }

    .actions .btn-edit,
    .actions a[href*="edit"] {
        background: #ff9800 !important;
    }

    .actions .btn-delete,
    .actions button[class*="delete"] {
        background: #f44336 !important;
    }

    .actions .btn-make-admin,
    .actions button[class*="make-admin"] {
        background: #4caf50 !important;
    }

    .actions .btn-remove-admin,
    .actions button[class*="remove-admin"] {
        background: #ff9800 !important;
    }

    /* Icon spacing */
    .actions i {
        color: white;
        font-size: 0.8rem;
    }
</style>
</body>
</html>
