<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - Admin</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<!-- Navigation section -->
<nav class="navbar">
    <div class="container">
        <a href="/" class="logo">
            DIU <span>LostFinder</span>
        </a>
        <div class="nav-links">
            <a href="/" class="nav-link">Home</a>
            <a href="/dashboard" class="nav-link">Dashboard</a>
            <a href="/admin/dashboard" class="nav-link">Admin</a>

            <form th:action="@{/logout}" method="post" class="nav-form">
                <button type="submit" class="nav-link">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="admin-container">
    <div class="admin-header">
        <h1><i class="fas fa-users"></i> Manage Users</h1>
        <div class="search-box">
            <form method="get" action="/admin/users">
                <input type="text" name="search" placeholder="Search by name or email..."
                       th:value="${searchKeyword}">
                <button type="submit"><i class="fas fa-search"></i></button>
            </form>
        </div>
    </div>

    <div class="users-table">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Student ID</th>
                <th>Department</th>
                <th>Role</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}">1</td>
                <td th:text="${user.fullName}">John Doe</td>
                <td th:text="${user.email}">john@diu.edu.bd</td>
                <td th:text="${user.studentId}">221-15-1234</td>
                <td th:text="${user.department}">CSE</td>
                <td>
                        <span th:class="${user.role == 'ADMIN'} ? 'badge-admin' : 'badge-user'"
                              th:text="${user.role}">USER</span>
                </td>
                <td class="actions">
                    <a th:href="@{/admin/users/view/{id}(id=${user.id})}" class="btn-view">
                        <i class="fas fa-eye"></i>
                    </a>
                    <a th:href="@{/admin/users/edit/{id}(id=${user.id})}" class="btn-edit">
                        <i class="fas fa-edit"></i>
                    </a>
                    <form th:action="@{/admin/users/delete/{id}(id=${user.id})}" method="post"
                          style="display: inline;">
                        <button type="submit" class="btn-delete" onclick="return confirm('Delete this user?')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </form>
                    <form th:if="${user.role == 'USER'}" th:action="@{/admin/users/make-admin/{id}(id=${user.id})}"
                          method="post" style="display: inline;">
                        <button type="submit" class="btn-make-admin" title="Make Admin">
                            <i class="fas fa-user-shield"></i>
                        </button>
                    </form>
                    <form th:if="${user.role == 'ADMIN'}" th:action="@{/admin/users/remove-admin/{id}(id=${user.id})}"
                          method="post" style="display: inline;">
                        <button type="submit" class="btn-remove-admin" title="Remove Admin">
                            <i class="fas fa-user-minus"></i>
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<footer class="footer">
    <div class="container">
        <p>&copy; 2026 DIU LostFinder. All rights reserved.</p>
    </div>
</footer>
</body>
</html>
