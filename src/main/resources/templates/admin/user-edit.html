<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User - Admin</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<nav class="navbar">
    <div class="container">
        <a href="/" class="logo">DIU <span>LostFinder</span></a>
        <div class="nav-links">
            <a href="/" class="nav-link">Home</a>
            <a href="/admin/dashboard" class="nav-link">Dashboard</a>
            <a href="/admin/items" class="nav-link">Items</a>
            <a href="/admin/users" class="nav-link">Users</a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="nav-link">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="admin-container">
    <h1><i class="fas fa-user-edit"></i> Edit User</h1>

    <div class="edit-form-container">
        <form th:action="@{/admin/users/update/{id}(id=${user.id})}" method="post">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Full Name:</label>
                <input type="text" name="fullName" th:value="${user.fullName}" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email:</label>
                <input type="email" name="email" th:value="${user.email}" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-id-card"></i> Student ID:</label>
                <input type="text" name="studentId" th:value="${user.studentId}">
            </div>

            <div class="form-group">
                <label><i class="fas fa-building"></i> Department:</label>
                <input type="text" name="department" th:value="${user.department}">
            </div>

            <div class="form-group">
                <label><i class="fas fa-phone"></i> Phone:</label>
                <input type="text" name="phone" th:value="${user.phone}">
            </div>

            <div class="form-buttons">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Update User
                </button>
                <a href="/admin/users" class="btn btn-secondary">
                    <i class="fas fa-times"></i> Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<style>
    .edit-form-container {
        max-width: 600px;
        margin: 0 auto;
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: var(--shadow);
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        color: var(--text-dark);
    }

    .form-group label i {
        color: var(--diu-green);
        margin-right: 8px;
    }

    .form-group input {
        width: 100%;
        padding: 10px 12px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 1rem;
        transition: all 0.3s;
    }

    .form-group input:focus {
        outline: none;
        border-color: var(--diu-green);
        box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
    }

    .form-buttons {
        display: flex;
        gap: 15px;
        margin-top: 25px;
    }

    .btn-primary {
        background: linear-gradient(135deg, var(--diu-green), var(--diu-blue));
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 500;
        transition: all 0.3s ease;
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-hover);
    }

    .btn-secondary {
        background: #666;
        color: white;
        text-decoration: none;
        padding: 10px 20px;
        border-radius: 8px;
        display: inline-block;
        transition: all 0.3s ease;
    }

    .btn-secondary:hover {
        background: #555;
        transform: translateY(-2px);
    }
</style>

<footer class="footer">
    <div class="container">
        <p>&copy; 2026 DIU LostFinder. All rights reserved.</p>
    </div>
</footer>
</body>
</html>
