<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Claims - Admin</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<nav class="navbar">
    <div class="container">
        <a href="/" class="logo">DIU <span>LostFinder</span></a>
        <div class="nav-links">
            <a href="/" class="nav-link">Home</a>
            <a href="/admin/dashboard" class="nav-link">Dashboard</a>
            <a href="/admin/items" class="nav-link">Items</a>
            <a href="/admin/claims" class="nav-link active">Claims</a>
            <a href="/admin/reports" class="nav-link">Reports</a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="nav-link">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="admin-container">
    <h1><i class="fas fa-clipboard-list"></i> Manage Claims</h1>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <!-- Pending Claims -->
    <div class="section">
        <h2><i class="fas fa-clock"></i> Pending Claims (<span th:text="${pendingClaims.size()}">0</span>)</h2>
        <div class="table-responsive">
            <table class="data-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Item</th>
                    <th>Claimant</th>
                    <th>Description</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="claim : ${pendingClaims}">
                    <td th:text="${claim.id}">1</td>
                    <td th:text="${claim.item != null ? claim.item.title : 'N/A'}">Item</td>
                    <td th:text="${claim.claimant != null ? claim.claimant.fullName : 'Unknown'}">Claimant</td>
                    <td th:text="${claim.description}">Description</td>
                    <td th:text="${#temporals.format(claim.createdAt, 'dd MMM yyyy')}">Date</td>
                    <td class="actions">
                        <a th:href="@{/admin/claims/approve/{id}(id=${claim.id})}" class="btn-approve"
                           onclick="return confirm('Approve this claim?')"><i class="fas fa-check"></i> Approve</a>
                        <a th:href="@{/admin/claims/reject/{id}(id=${claim.id})}" class="btn-reject"
                           onclick="return confirm('Reject this claim?')"><i class="fas fa-times"></i> Reject</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- All Claims -->
    <div class="section">
        <h2><i class="fas fa-list"></i> All Claims</h2>
        <div class="table-responsive">
            <table class="data-table">
                <thead>
                <tr>
                    <th>Item</th>
                    <th>Claimant</th>
                    <th>Status</th>
                    <th>Date</th>
                    <th>Admin Notes</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="claim : ${allClaims}">
                    <td th:text="${claim.item != null ? claim.item.title : 'N/A'}">Item</td>
                    <td th:text="${claim.claimant != null ? claim.claimant.fullName : 'Unknown'}">Claimant</td>
                    <td><span
                            th:class="'badge ' + (${claim.status == 'PENDING'} ? 'badge-pending' : (${claim.status == 'APPROVED'} ? 'badge-approved' : 'badge-rejected'))"
                            th:text="${claim.status}">PENDING</span></td>
                    <td th:text="${#temporals.format(claim.createdAt, 'dd MMM yyyy')}">Date</td>
                    <td th:text="${claim.adminNotes}">Notes</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<style>
    .section {
        background: white;
        border-radius: 15px;
        padding: 20px;
        margin-bottom: 30px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    .table-responsive {
        overflow-x: auto;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    th, td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid #eee;
    }

    th {
        background: #f5f5f5;
    }

    .badge-pending {
        background: #ff9800;
        color: white;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 12px;
    }

    .badge-approved {
        background: #4caf50;
        color: white;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 12px;
    }

    .badge-rejected {
        background: #f44336;
        color: white;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 12px;
    }

    .btn-approve {
        background: #4caf50;
        color: white;
        padding: 5px 10px;
        border-radius: 5px;
        text-decoration: none;
        display: inline-block;
        margin: 2px;
    }

    .btn-reject {
        background: #ff9800;
        color: white;
        padding: 5px 10px;
        border-radius: 5px;
        text-decoration: none;
        display: inline-block;
        margin: 2px;
    }

    .alert {
        padding: 12px 20px;
        margin-bottom: 20px;
        border-radius: 8px;
    }

    .alert-success {
        background: #d4edda;
        color: #155724;
        border-left: 4px solid #28a745;
    }

    .alert-error {
        background: #f8d7da;
        color: #721c24;
        border-left: 4px solid #f44336;
    }
</style>
</body>
</html>
